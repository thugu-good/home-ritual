<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="귀가루틴">
  <title>귀가 루틴</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f; --card: #1a1a1a; --bc: #2a2a2a; --bh: #3a3a3a;
      --txt: #f0ede8; --sub: #888; --muted: #555;
      --accent: #c8b89a; --green: #7cb87c; --red: #c87c7c;
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--txt);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overscroll-behavior: none;
    }
    #app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100dvh;
      position: relative;
    }
    .screen { display: none; flex-direction: column; min-height: 100dvh; }
    .screen.active { display: flex; }

    /* ── CHECKLIST (홈) ── */
    #s-checklist {
      padding: 1.5rem 1.25rem;
      padding-top: calc(1.5rem + env(safe-area-inset-top));
      padding-bottom: calc(1.5rem + env(safe-area-inset-bottom));
      overflow-y: auto;
    }
    .cl-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
    .cl-left { display: flex; flex-direction: column; gap: 2px; }
    .cl-title { font-size: 20px; font-weight: 500; letter-spacing: -0.3px; }
    .cl-date { font-size: 12px; color: var(--muted); }
    .cl-right { display: flex; align-items: center; gap: 8px; }
    .cl-pill { font-size: 12px; color: var(--accent); background: rgba(200,184,154,.12); border: 0.5px solid rgba(200,184,154,.2); border-radius: 99px; padding: 4px 11px; }
    .icon-btn-sm { background: none; border: 0.5px solid var(--bc); border-radius: 8px; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--sub); transition: all .15s; }
    .icon-btn-sm:hover { border-color: var(--bh); color: var(--txt); }
    .prog-track { height: 3px; background: #2a2a2a; border-radius: 99px; overflow: hidden; margin-bottom: 1.25rem; }
    .prog-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width .5s cubic-bezier(.34,1.56,.64,1); }
    .task-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.1rem; }
    .task-row { display: flex; align-items: center; gap: 12px; padding: 15px 16px; background: var(--card); border: 0.5px solid var(--bc); border-radius: 14px; transition: border-color .2s; }
    .task-row:hover { border-color: var(--bh); }
    .task-row.done { opacity: .4; }
    .t-check { width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid #444; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; transition: all .2s; }
    .task-row.done .t-check { background: var(--green); border-color: var(--green); }
    .t-info { flex: 1; min-width: 0; cursor: pointer; }
    .t-name { font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .task-row.done .t-name { color: var(--muted); text-decoration: line-through; }
    .t-hint { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .t-emoji { font-size: 20px; flex-shrink: 0; }
    .add-row { display: flex; gap: 8px; }
    .add-input { flex: 1; background: var(--card); border: 0.5px solid var(--bc); border-radius: 10px; padding: 11px 14px; font-size: 15px; color: var(--txt); outline: none; font-family: inherit; }
    .add-input::placeholder { color: var(--muted); }
    .add-input:focus { border-color: var(--bh); }
    .add-btn { padding: 11px 16px; background: var(--card); border: 0.5px solid var(--bc); border-radius: 10px; color: var(--sub); font-size: 22px; cursor: pointer; transition: all .15s; display: flex; align-items: center; justify-content: center; width: 46px; }
    .add-btn:hover { border-color: var(--bh); color: var(--txt); }

    /* ── MANAGE ── */
    #s-manage { padding-bottom: env(safe-area-inset-bottom); }
    .mg-header { display: flex; align-items: center; gap: 10px; padding: calc(1.5rem + env(safe-area-inset-top)) 1.25rem 0; margin-bottom: 1.1rem; }
    .back-btn { background: none; border: 0.5px solid var(--bc); border-radius: 8px; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--sub); flex-shrink: 0; transition: all .15s; }
    .back-btn:hover { border-color: var(--bh); color: var(--txt); }
    .mg-title { font-size: 18px; font-weight: 500; letter-spacing: -0.3px; }
    .mg-body { padding: 0 1.25rem 1.25rem; overflow-y: auto; }
    .mg-sub { font-size: 13px; color: var(--muted); margin-bottom: 1.25rem; }
    .mg-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.25rem; }
    .mg-row { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--card); border: 0.5px solid var(--bc); border-radius: 12px; }
    .mg-emoji { font-size: 20px; flex-shrink: 0; }
    .mg-info { flex: 1; min-width: 0; }
    .mg-name { font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mg-hint-text { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .mg-acts { display: flex; gap: 6px; flex-shrink: 0; }
    .icon-btn { background: none; border: 0.5px solid var(--bc); border-radius: 8px; cursor: pointer; color: var(--sub); width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; transition: all .15s; }
    .icon-btn:hover { border-color: var(--bh); color: var(--txt); }
    .icon-btn.del:hover { border-color: rgba(200,124,124,.4); color: var(--red); }
    .mg-add-row { display: flex; gap: 8px; }
    .mg-add-input { flex: 1; background: var(--card); border: 0.5px solid var(--bc); border-radius: 10px; padding: 11px 14px; font-size: 15px; color: var(--txt); outline: none; font-family: inherit; }
    .mg-add-input::placeholder { color: var(--muted); }
    .mg-add-input:focus { border-color: var(--bh); }
    .mg-add-btn { padding: 11px 18px; background: var(--card); border: 0.5px solid var(--bc); border-radius: 10px; color: var(--sub); font-size: 15px; cursor: pointer; font-family: inherit; transition: all .15s; }
    .mg-add-btn:hover { border-color: var(--bh); color: var(--txt); }

    /* ── EDIT OVERLAY ── */
    #edit-overlay { display: none; min-height: 100dvh; background: rgba(0,0,0,.7); align-items: center; justify-content: center; padding: 1.5rem; }
    #edit-overlay.open { display: flex; }
    .edit-modal { background: #1e1e1e; border: 0.5px solid var(--bh); border-radius: 20px; padding: 1.5rem; width: 100%; max-width: 320px; }
    .edit-modal-title { font-size: 17px; font-weight: 500; margin-bottom: 1.1rem; }
    .edit-label { font-size: 12px; color: var(--muted); margin-bottom: 5px; display: block; }
    .edit-field { width: 100%; background: #111; border: 0.5px solid var(--bc); border-radius: 10px; padding: 11px 13px; font-size: 15px; color: var(--txt); outline: none; font-family: inherit; margin-bottom: 12px; }
    .edit-field:focus { border-color: var(--bh); }
    .emoji-grid { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 1.1rem; }
    .emoji-btn { font-size: 22px; background: #111; border: 0.5px solid var(--bc); border-radius: 9px; width: 42px; height: 42px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color .15s; }
    .emoji-btn.sel { border-color: var(--accent); background: rgba(200,184,154,.1); }
    .modal-actions { display: flex; gap: 8px; }
    .btn-save { flex: 1; padding: 12px; background: var(--accent); color: #1a1200; border: none; border-radius: 99px; font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; }
    .btn-cancel { padding: 12px 18px; background: none; border: 0.5px solid var(--bc); border-radius: 99px; color: var(--sub); font-size: 15px; cursor: pointer; font-family: inherit; }
    .btn-del { padding: 12px 18px; background: rgba(200,124,124,.1); border: 0.5px solid rgba(200,124,124,.25); border-radius: 99px; color: var(--red); font-size: 15px; cursor: pointer; font-family: inherit; }

    /* ── UNLOCK ── */
    #s-unlock { align-items: center; justify-content: center; text-align: center; padding: 2rem 1.5rem; }
    .ul-icon { font-size: 48px; margin-bottom: 1.25rem; }
    .ul-title { font-size: 26px; font-weight: 500; margin-bottom: 0.4rem; }
    .ul-sub { font-size: 15px; color: var(--sub); margin-bottom: 0.4rem; line-height: 1.6; }
    .ul-time { font-size: 13px; color: var(--muted); margin-bottom: 1.75rem; }
    .streak-row { display: flex; align-items: center; gap: 6px; justify-content: center; margin-bottom: 1.75rem; }
    .s-dot { width: 10px; height: 10px; border-radius: 50%; background: #2a2a2a; }
    .s-dot.on { background: var(--accent); }
    .s-label { font-size: 13px; color: var(--muted); margin-left: 4px; }
    .reset-btn { padding: 13px 30px; background: none; border: 0.5px solid var(--bc); border-radius: 99px; color: var(--sub); font-size: 15px; cursor: pointer; font-family: inherit; transition: all .15s; }
    .reset-btn:hover { border-color: var(--bh); color: var(--txt); }
  </style>
</head>
<body>
<div id="app">

  <!-- CHECKLIST (홈 화면) -->
  <div id="s-checklist" class="screen active">
    <div class="cl-header">
      <div class="cl-left">
        <div class="cl-title">귀가 루틴</div>
        <div class="cl-date" id="cl-date"></div>
      </div>
      <div class="cl-right">
        <div class="cl-pill" id="cl-pill">0 / 5</div>
        <button class="icon-btn-sm" onclick="goTo('manage')" aria-label="루틴 편집">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="task-list" id="task-list"></div>
    <div class="add-row">
      <input class="add-input" id="cl-add-input" placeholder="새 루틴 추가..." maxlength="20">
      <button class="add-btn" onclick="quickAdd()" aria-label="추가">+</button>
    </div>
  </div>

  <!-- MANAGE -->
  <div id="s-manage" class="screen">
    <div class="mg-header">
      <button class="back-btn" onclick="goTo('checklist')" aria-label="뒤로">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <div class="mg-title">루틴 관리</div>
    </div>
    <div class="mg-body">
      <div class="mg-sub">항목을 추가하거나 편집·삭제할 수 있어</div>
      <div class="mg-list" id="mg-list"></div>
      <div class="mg-add-row">
        <input class="mg-add-input" id="mg-add-input" placeholder="새 루틴 추가..." maxlength="20">
        <button class="mg-add-btn" onclick="mgAdd()">추가</button>
      </div>
    </div>
  </div>

  <!-- EDIT OVERLAY -->
  <div id="edit-overlay">
    <div class="edit-modal">
      <div class="edit-modal-title">루틴 편집</div>
      <label class="edit-label">이름</label>
      <input class="edit-field" id="e-name" maxlength="20" placeholder="루틴 이름">
      <label class="edit-label">설명 (선택)</label>
      <input class="edit-field" id="e-hint" maxlength="30" placeholder="짧은 설명...">
      <label class="edit-label" style="margin-bottom:8px">이모지</label>
      <div class="emoji-grid" id="emoji-grid"></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeEdit()">취소</button>
        <button class="btn-del" onclick="deleteTask()">삭제</button>
        <button class="btn-save" onclick="saveEdit()">저장</button>
      </div>
    </div>
  </div>

  <!-- UNLOCK -->
  <div id="s-unlock" class="screen">
    <div class="ul-icon">✅</div>
    <div class="ul-title">모두 완료!</div>
    <div class="ul-sub">오늘 루틴을 다 끝냈어.<br>핸드폰 마음껏 써도 돼.</div>
    <div class="ul-time" id="ul-time"></div>
    <div class="streak-row" id="streak-row"></div>
    <button class="reset-btn" onclick="reset()">↺ 다시 시작</button>
  </div>

</div>
<script>
const EMOJIS = ['🧼','👜','🧥','🚿','💧','🏠','👟','🍵','📖','🌿','🛁','🪥','🧺','🪟','💊','🎒'];
const DEFAULT = [
  {id:1,name:'손 씻기',hint:'30초 이상',emoji:'🧼',done:false},
  {id:2,name:'주머니 정리',hint:'지갑·열쇠·이어폰',emoji:'👜',done:false},
  {id:3,name:'겉옷 걸기',hint:'옷걸이에 걸어두기',emoji:'🧥',done:false},
  {id:4,name:'샤워하기',hint:'15분 이내',emoji:'🚿',done:false},
  {id:5,name:'물 한 잔',hint:'수분 보충',emoji:'💧',done:false},
];
const SVG_EDIT  = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
const SVG_TRASH = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;
const SVG_CHECK = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

let tasks, streak, nextId, editId;

function load() {
  try { tasks = JSON.parse(localStorage.getItem('rt_tasks')); } catch(e) { tasks=null; }
  if (!tasks) tasks = DEFAULT.map(t=>({...t}));
  try { streak = parseInt(localStorage.getItem('rt_streak')||'0'); } catch(e) { streak=0; }
  nextId = Math.max(...tasks.map(t=>t.id), 0) + 1;
}
function save() {
  try {
    localStorage.setItem('rt_tasks', JSON.stringify(tasks));
    localStorage.setItem('rt_streak', streak);
  } catch(e) {}
}
load();

function doneCount() { return tasks.filter(t=>t.done).length; }

const SCREENS = ['s-checklist','s-manage','s-unlock'];
function goTo(s) {
  SCREENS.forEach(id => document.getElementById(id).classList.remove('active'));
  const ov = document.getElementById('edit-overlay');
  ov.classList.remove('open'); ov.style.display = '';
  if (s==='checklist') { document.getElementById('s-checklist').classList.add('active'); renderChecklist(); }
  if (s==='manage')    { document.getElementById('s-manage').classList.add('active'); renderManage(); }
  if (s==='unlock')    { document.getElementById('s-unlock').classList.add('active'); renderUnlock(); }
}

/* ── CHECKLIST ── */
function renderChecklist() {
  const total = tasks.length, done = doneCount();
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('cl-pill').textContent = done + ' / ' + total;
  document.getElementById('prog-fill').style.width = pct + '%';

  const now = new Date();
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('cl-date').textContent =
    now.getMonth()+1 + '월 ' + now.getDate() + '일 ' + days[now.getDay()] + '요일';

  document.getElementById('task-list').innerHTML = tasks.map(t => `
    <div class="task-row ${t.done?'done':''}">
      <div class="t-check" onclick="toggle(${t.id})">${t.done ? SVG_CHECK : ''}</div>
      <div class="t-info" onclick="toggle(${t.id})">
        <div class="t-name">${t.name}</div>
        ${t.hint ? `<div class="t-hint">${t.hint}</div>` : ''}
      </div>
      <div class="t-emoji">${t.emoji||''}</div>
    </div>`).join('');
}

function toggle(id) {
  const t = tasks.find(t=>t.id===id);
  if (!t) return;
  t.done = !t.done;
  save(); renderChecklist();
  if (tasks.every(t=>t.done)) {
    streak++; save();
    setTimeout(()=>goTo('unlock'), 500);
  }
}

function quickAdd() {
  const inp = document.getElementById('cl-add-input');
  const name = inp.value.trim();
  if (!name) return;
  tasks.push({id:nextId++, name, hint:'', emoji:'✨', done:false});
  inp.value = '';
  save(); renderChecklist();
}
document.getElementById('cl-add-input').addEventListener('keydown', e=>{ if(e.key==='Enter') quickAdd(); });

/* ── MANAGE ── */
function renderManage() {
  document.getElementById('mg-list').innerHTML = tasks.map(t => `
    <div class="mg-row">
      <div class="mg-emoji">${t.emoji||'✨'}</div>
      <div class="mg-info">
        <div class="mg-name">${t.name}</div>
        ${t.hint ? `<div class="mg-hint-text">${t.hint}</div>` : ''}
      </div>
      <div class="mg-acts">
        <button class="icon-btn" onclick="openEdit(${t.id})" aria-label="편집">${SVG_EDIT}</button>
        <button class="icon-btn del" onclick="confirmDel(${t.id})" aria-label="삭제">${SVG_TRASH}</button>
      </div>
    </div>`).join('');
}

function confirmDel(id) {
  const t = tasks.find(t=>t.id===id);
  if (!t || !confirm(`"${t.name}"을 삭제할까?`)) return;
  tasks = tasks.filter(t=>t.id!==id);
  save(); renderManage();
}

function mgAdd() {
  const inp = document.getElementById('mg-add-input');
  const name = inp.value.trim();
  if (!name) return;
  tasks.push({id:nextId++, name, hint:'', emoji:'✨', done:false});
  inp.value = '';
  save(); renderManage();
}
document.getElementById('mg-add-input').addEventListener('keydown', e=>{ if(e.key==='Enter') mgAdd(); });

/* ── EDIT MODAL ── */
function openEdit(id) {
  editId = id;
  const t = tasks.find(t=>t.id===id);
  if (!t) return;
  document.getElementById('e-name').value = t.name;
  document.getElementById('e-hint').value = t.hint||'';
  document.getElementById('emoji-grid').innerHTML = EMOJIS.map(e =>
    `<button class="emoji-btn ${e===t.emoji?'sel':''}" onclick="selEmoji(this)">${e}</button>`
  ).join('');
  SCREENS.forEach(id=>document.getElementById(id).classList.remove('active'));
  const ov = document.getElementById('edit-overlay');
  ov.style.display = 'flex'; ov.classList.add('open');
}

function selEmoji(btn) {
  document.querySelectorAll('.emoji-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
}

function saveEdit() {
  const name = document.getElementById('e-name').value.trim();
  if (!name) return;
  const sel = document.querySelector('.emoji-btn.sel');
  const emoji = sel ? sel.textContent : '✨';
  const hint = document.getElementById('e-hint').value.trim();
  const t = tasks.find(t=>t.id===editId);
  if (t) { t.name=name; t.hint=hint; t.emoji=emoji; }
  save(); closeEdit();
}

function deleteTask() {
  const t = tasks.find(t=>t.id===editId);
  if (!t || !confirm(`"${t.name}"을 삭제할까?`)) return;
  tasks = tasks.filter(t=>t.id!==editId);
  save(); closeEdit();
}

function closeEdit() {
  const ov = document.getElementById('edit-overlay');
  ov.classList.remove('open'); ov.style.display = '';
  goTo('manage');
}

/* ── UNLOCK ── */
function renderUnlock() {
  const now = new Date();
  document.getElementById('ul-time').textContent =
    now.getHours().toString().padStart(2,'0') + ':' +
    now.getMinutes().toString().padStart(2,'0') + ' 완료';
  const show = Math.min(streak, 7);
  document.getElementById('streak-row').innerHTML =
    Array.from({length:7}, (_,i) => `<div class="s-dot ${i<show?'on':''}"></div>`).join('') +
    (streak > 0 ? `<span class="s-label">${streak}일 연속</span>` : '');
}

function reset() {
  tasks = tasks.map(t=>({...t, done:false}));
  save(); goTo('checklist');
}

renderChecklist();
</script>
</body>
</html>
